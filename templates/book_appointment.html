<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Book Appointment with Dr. {{ doctor['name'] }}</h2>
    <p>Specialization: {{ doctor['specialization'] }}</p>

    <form method="POST">
        <label>Your Name:</label><br>
        <input type="text" name="patient_name" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="patient_phone" required><br><br>

        <label>Select Available Slot:</label><br>
        <select name="slot_id" required>
            {% for slot in slots %}
            <option value="{{ slot['id'] }}">{{ slot['date'] }} | {{ slot['time_slot'] }}</option>
            {% endfor %}
        </select><br><br>

        <label>Problem/Reason for visit:</label><br>
        <textarea name="problem" rows="3" cols="30" required placeholder="Mee problem enti detail ga cheppandi"></textarea><br><br>

        <button type="submit">Confirm Booking</button>
    </form>

    <p><a href="/patient/doctors">Back to Doctors List</a></p>
</body>
</html>
